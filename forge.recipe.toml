#:schema https://raw.githubusercontent.com/razterizer/forge/main/schemas/forge.recipe.schema.json

[project]
name = "AudioLibSwitcher_applaudio"
version = "1.0.0"
type = "header_only"
cpp_std = 20

[sources]
paths = []
public_headers = ["include/AudioLibSwitcher/AudioLibSwitcher_applaudio.h"]
include_dirs = ["AudioLibSwitcher/include", "include"]

[build]
number = 1

[release]
build_number_format = "dotted"

[dependencies]
applaudio = { path = "../applaudio" }

# TODO: Replace local dependencies with reproducible workflow dependencies.
# [profile.workflow-release.dependencies]
# applaudio = { github = "owner/applaudio", version = "<published-version>" }

[profile.workflow-release.build]
configuration = "Release"

[profile.Debug.build]
configuration = "Debug"
defines = ["DEBUG=1"]

[profile.Release.build]
configuration = "Release"
